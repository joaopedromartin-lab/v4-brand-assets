<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --font-impact: 'Fjalla One', 'IBM Plex Sans', sans-serif; --maxw-wide: 1280px; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; }
  .cons {
    position: relative; overflow: hidden; color: #fff;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(255,72,31,0.5) 0%, transparent 55%),
      linear-gradient(180deg, #E50914 0%, #A50A08 36%, #4A0503 74%, #120101 100%);
  }
  .cons__inner { position: relative; z-index: 2; max-width: var(--maxw-wide); margin: 0 auto; padding: clamp(64px, 8vw, 110px) 16px clamp(48px, 6vw, 84px); }
  .cons__giant {
    position: relative; z-index: 0; margin: 6px 0 0; text-align: center;
    font-family: var(--font-impact); font-weight: 400; text-transform: uppercase;
    font-size: clamp(64px, 12.5vw, 220px); line-height: .85; letter-spacing: .01em;
  }
  #report { font-family: monospace; font-size: 14px; color: #000; background: #fff; padding: 8px; white-space: pre; }
</style>
</head>
<body>
<!-- Variant A: plain text (fallback / noanim path, no SplitText) -->
<section class="cons" id="consA">
  <div class="cons__inner">
    <h2 class="cons__giant" id="giantA">Conselheiros</h2>
  </div>
</section>

<!-- Variant B: same, but will be split with SplitText type:'chars' like line 1720 of index.html -->
<section class="cons" id="consB">
  <div class="cons__inner">
    <h2 class="cons__giant" id="giantB">Conselheiros</h2>
  </div>
</section>

<div id="report">pending</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
<script>
(function () {
  function run() {
    try { gsap.registerPlugin(SplitText); new SplitText('#giantB', { type: 'chars' }); } catch (e) {}
    var a = document.getElementById('giantA');
    var b = document.getElementById('giantB');
    var ra = a.getBoundingClientRect();
    var fs = getComputedStyle(a).fontSize;
    var range = document.createRange();
    range.selectNodeContents(a);
    var textRect = range.getBoundingClientRect();
    var bRect = b.getBoundingClientRect();
    var lines = Math.round(bRect.height / (parseFloat(fs) * 0.85));
    var out = [
      'viewport=' + window.innerWidth + 'x' + window.innerHeight,
      'fontSize=' + fs,
      'fontLoaded=' + document.fonts.check(fs + " 'Fjalla One'"),
      'A.scrollWidth=' + a.scrollWidth,
      'A.clientWidth(content box)=' + a.clientWidth,
      'A.textRect.left=' + textRect.left.toFixed(1) + ' right=' + textRect.right.toFixed(1) + ' width=' + textRect.width.toFixed(1),
      'A overflows viewport left by ' + (-textRect.left).toFixed(1) + 'px, right by ' + (textRect.right - window.innerWidth).toFixed(1) + 'px',
      'B.height=' + bRect.height.toFixed(1) + ' => approx lines=' + lines,
      'gsapLoaded=' + (typeof window.gsap !== 'undefined') + ' splitLoaded=' + (typeof window.SplitText !== 'undefined')
    ].join('\n');
    document.getElementById('report').textContent = out;
    document.title = 'DONE';
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { setTimeout(run, 100); });
  } else {
    window.addEventListener('load', function () { setTimeout(run, 300); });
  }
})();
</script>
</body>
</html>
